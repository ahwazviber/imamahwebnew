<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>imamah</title>
    <meta name="description" content="A unified platform for the Ummah. Launching December 31, 2026." />
    
    <!-- iOS Home Screen App Name -->
    <meta name="apple-mobile-web-app-title" content="imamah">
    
    <!-- Enable standalone app mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Status bar style (optional, premium) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Favicon -->
    <link rel="icon" href="./assets/imamah-logo.png" type="image/png">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="./assets/imamah-logo.png">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://imamah.app/">
    <meta property="og:title" content="imamah">
    <meta property="og:description" content="A unified platform for the Ummah. Launching December 31, 2026.">
    <meta property="og:image" content="./assets/imamah-logo.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://imamah.app/">
    <meta property="twitter:title" content="imamah">
    <meta property="twitter:description" content="A unified platform for the Ummah. Launching December 31, 2026.">
    <meta property="twitter:image" content="./assets/imamah-logo.png">
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <svg class="logo-wave" viewBox="0 0 1200 1200" aria-label="imamah">
          <defs>
            <filter id="wave">
              <feTurbulence
                type="fractalNoise"
                baseFrequency="0.008 0.02"
                numOctaves="1"
                seed="2"
              >
                <animate
                  attributeName="baseFrequency"
                  dur="18s"
                  values="0.008 0.02; 0.01 0.025; 0.008 0.02"
                  repeatCount="indefinite"
                />
              </feTurbulence>
              <feDisplacementMap
                in="SourceGraphic"
                scale="4"
              />
            </filter>
          </defs>
          <image
            href="./assets/imamah-logo.png"
            x="0"
            y="0"
            width="1200"
            height="1200"
            filter="url(#wave)"
            preserveAspectRatio="xMidYMid meet"
          />
        </svg>

        <h1 class="brand-wordmark reveal" style="--d: 0ms;" aria-label="imamah">
          <span class="wm-base">imamah</span>
          <span class="wm-glow" aria-hidden="true">imamah</span>
        </h1>

        <p class="desc reveal" style="--d: 90ms;">
          A unified infrastructure for masjids, organizations, and individuals.
        </p>

        <p class="tagline reveal" style="--d: 170ms;">
          Thoughtfully designed. Community-driven.
        </p>

        <div class="launch-chip reveal" style="--d: 250ms;" role="status" aria-label="Launching date">
          <span class="launch-dot" aria-hidden="true"></span>
          <span class="launch-text">Launching December 31, 2026</span>
        </div>

        <p class="inquiry-line reveal" style="--d: 320ms;">
          <a href="mailto:contact@imamah.app?subject=imamah%20Inquiry" class="inquiry-link">Masjid or organization inquiries</a>
        </p>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 imamah · <a href="mailto:contact@imamah.app" class="footer-link">contact@imamah.app</a> · <a href="privacy.html" class="footer-link">Privacy Policy</a></p>
    </footer>

    <!-- Premium Visitor Counter -->
    <div class="visitor-counter" id="visitorCounter" role="button" tabindex="0" aria-label="View visitor statistics">
      <div class="counter-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
    </div>

    <!-- Visitor Stats Modal -->
    <div class="visitor-modal" id="visitorModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">imamah.app Analytics</h3>
          <button class="modal-close" id="modalClose" aria-label="Close modal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-number" id="totalVisitors">0</div>
              <div class="stat-label">Total Visitors</div>
              <div class="stat-sublabel">All time</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
